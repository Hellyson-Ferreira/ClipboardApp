name: Build & Release DMG

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Select Xcode 16 ─────────────────────────────────────────────────
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer \
            2>/dev/null || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          echo "Using: $(xcodebuild -version | head -1)"

      # ── 3. Build (ad-hoc signing, unsigned) ────────────────────────────────
      - name: Build app
        run: |
          set -o pipefail
          xcodebuild \
            -project ClipboardApp.xcodeproj \
            -scheme ClipboardApp \
            -configuration Release \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MACOSX_DEPLOYMENT_TARGET=15.0 \
            SWIFT_APPROACHABLE_CONCURRENCY=NO \
            | grep -E "^(Build|error:|warning:|CompileSwift|Ld )" || true

      # ── 4. Locate the built .app ────────────────────────────────────────────
      - name: Locate .app
        id: app
        run: |
          APP=$(find "$RUNNER_TEMP/DerivedData" -name "ClipboardApp.app" \
                -not -path "*/Index*" | head -1)
          echo "path=$APP" >> "$GITHUB_OUTPUT"
          echo "Found: $APP"

      # ── 5. Create DMG ──────────────────────────────────────────────────────
      - name: Create DMG
        id: dmg
        run: |
          VERSION=$(defaults read \
            "${{ steps.app.outputs.path }}/Contents/Info.plist" \
            CFBundleShortVersionString 2>/dev/null || echo "1.0")
          SHORT_SHA=$(git rev-parse --short HEAD)
          DMG_NAME="ClipboardApp-v${VERSION}-${SHORT_SHA}.dmg"

          # Staging folder with app + Applications symlink
          STAGING="$RUNNER_TEMP/dmg_staging"
          mkdir -p "$STAGING"
          cp -R "${{ steps.app.outputs.path }}" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create \
            -volname "ClipboardApp" \
            -srcfolder "$STAGING" \
            -ov \
            -format UDZO \
            "$RUNNER_TEMP/$DMG_NAME"

          echo "name=$DMG_NAME"           >> "$GITHUB_OUTPUT"
          echo "path=$RUNNER_TEMP/$DMG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"         >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA"     >> "$GITHUB_OUTPUT"

      # ── 6. Create GitHub Release ───────────────────────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.dmg.outputs.version }}-${{ steps.dmg.outputs.short_sha }}"
          name: "ClipboardApp v${{ steps.dmg.outputs.version }} (${{ steps.dmg.outputs.short_sha }})"
          body: |
            ## ClipboardApp v${{ steps.dmg.outputs.version }}

            Automated build from [`${{ steps.dmg.outputs.short_sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

            ### Install
            1. Download **${{ steps.dmg.outputs.name }}** below
            2. Open the DMG and drag **ClipboardApp** to **Applications**
            3. On first launch: right-click the app → **Open** (bypasses Gatekeeper for unsigned builds)

            > ⚠️ This is an **unsigned build**. A proper signed/notarized release requires an Apple Developer certificate configured in repository secrets.
          files: ${{ steps.dmg.outputs.path }}
          generate_release_notes: true
          make_latest: true
